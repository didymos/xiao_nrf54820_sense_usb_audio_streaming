# =============================================================================
# XIAO nRF52840 Sense — USB Microphone Firmware
# Audio pipeline: PDM MEMS mic → nrfx_pdm (HW decimation) → USB Audio Class 1
# =============================================================================

# ---------------------------------------------------------------------------
# USB device stack (legacy/stable, UAC1 — works on all OS without drivers)
# ---------------------------------------------------------------------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_AUDIO=y
CONFIG_NET_BUF=y

# Device identity shown in OS audio panel
CONFIG_USB_DEVICE_MANUFACTURER="Seeed Studio"
CONFIG_USB_DEVICE_PRODUCT="XIAO BLE Sense Mic"
CONFIG_USB_DEVICE_VID=0x2886
CONFIG_USB_DEVICE_PID=0x0058
CONFIG_USB_DEVICE_SN="XIAO-MIC-001"

# ---------------------------------------------------------------------------
# Audio DMIC subsystem — nRF52840 PDM peripheral with HW CIC + FIR filter
# ---------------------------------------------------------------------------
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_NRFX_PDM=y

# nRFX low-level PDM driver
CONFIG_NRFX_PDM=y

# ---------------------------------------------------------------------------
# Kernel / scheduling
# ---------------------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# High-resolution system timer for 1 ms audio frames
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ---------------------------------------------------------------------------
# Logging (reduce overhead in production — set to WRN)
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_USB_DEVICE_LOG_LEVEL_WRN=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ---------------------------------------------------------------------------
# Power management (keep USB regulator on)
# ---------------------------------------------------------------------------
CONFIG_PM=n
