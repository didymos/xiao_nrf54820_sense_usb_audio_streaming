name: Build XIAO mic firmware (8 variants)

# Builds the app/ Zephyr firmware once per USB serial number
# (XIAO-MIC-001 .. XIAO-MIC-008) and uploads each zephyr.uf2 as a
# downloadable artifact. Runs on the official Zephyr CI container, so
# no local toolchain or SDK is required.

on:
  workflow_dispatch:      # manual "Run workflow" button
  push:
    branches:
      - claude/intelligent-bohr-oEhhk
    paths:
      - 'app/**'
      - '.github/workflows/build-firmware.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4   # bundles Zephyr SDK
    strategy:
      fail-fast: false
      matrix:
        mic: [1, 2, 3, 4, 5, 6, 7, 8]
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-0.16.8

    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          path: xiao

      - name: West init + update (fetch Zephyr v3.7.0)
        run: |
          west init -l xiao/app
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Compute zero-padded serial
        id: sn
        run: printf 'n=%03d\n' "${{ matrix.mic }}" >> "$GITHUB_OUTPUT"

      - name: Remove non-existent Kconfig symbol
        run: sed -i '/^CONFIG_USB_AUDIO_MICROPHONE=y/d' xiao/app/prj.conf

      - name: Build firmware for XIAO-MIC-${{ steps.sn.outputs.n }}
        run: |
          west build -p always -b xiao_ble/nrf52840/sense xiao/app -- \
            -DCONFIG_USB_DEVICE_PRODUCT="\"XIAO Mic ${{ matrix.mic }}\"" \
            -DCONFIG_USB_DEVICE_SN="\"XIAO-MIC-${{ steps.sn.outputs.n }}\""

      - name: Rename UF2
        run: cp build/zephyr/zephyr.uf2 xiao-mic-${{ steps.sn.outputs.n }}.uf2

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiao-mic-${{ steps.sn.outputs.n }}
          path: xiao-mic-${{ steps.sn.outputs.n }}.uf2
          if-no-files-found: error
