<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FieldRec</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #111;
    --surface:   #1e1e1e;
    --surface2:  #252525;
    --border:    #2e2e2e;
    --text:      #e8e8e8;
    --muted:     #777;
    --green:     #27ae60;
    --red:       #c0392b;
    --dark-red:  #8b0000;
    --amber:     #e67e22;
    --blue:      #2980b9;
    --radius:    12px;
    --btn-radius: 10px;
  }

  html { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Helvetica, Arial, sans-serif;
    font-size: 16px;
    min-height: 100%;
    padding: 14px;
    padding-bottom: 30px;
    max-width: 520px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-size: 0.62rem;
    background: #2a2a2a;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .badge.mock-badge {
    background: #2a200a;
    border-color: #5a3a00;
    color: var(--amber);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* ── Connection lost banner ────────────────────────────────────────────────── */
  #conn-banner {
    display: none;
    background: #3a1800;
    border: 1px solid #6a3000;
    border-radius: var(--btn-radius);
    padding: 10px 14px;
    font-size: 0.84rem;
    margin-bottom: 12px;
    text-align: center;
    color: #e8a060;
  }

  /* ── Error banner ──────────────────────────────────────────────────────────── */
  #error-banner {
    display: none;
    background: #2a0000;
    border: 1px solid #6a0000;
    border-radius: var(--btn-radius);
    padding: 12px 14px;
    margin-bottom: 12px;
    font-size: 0.84rem;
  }
  #error-banner strong { display: block; margin-bottom: 4px; color: #e06060; font-size: 0.9rem; }
  #error-text { color: #c08080; word-break: break-word; }

  /* ── Main action button ────────────────────────────────────────────────────── */
  #main-btn {
    width: 100%;
    padding: 24px 0;
    border: none;
    border-radius: var(--btn-radius);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.12s, transform 0.08s, background 0.2s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    user-select: none;
  }
  #main-btn:active:not(:disabled) { transform: scale(0.96); }
  #main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #main-btn.idle      { background: var(--green);    color: #fff; }
  #main-btn.arming    { background: var(--amber);    color: #fff; }
  #main-btn.recording { background: var(--red);      color: #fff; }
  #main-btn.stopping  { background: #444;            color: #aaa; }
  #main-btn.error     { background: var(--dark-red); color: #eee; }

  /* Pulse animation dot */
  .pulse-dot {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    animation: pulse 1.1s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.25; transform: scale(0.65); }
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: rgba(255,255,255,0.85);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Timer display ─────────────────────────────────────────────────────────── */
  #timer {
    text-align: center;
    font-size: 3.2rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    margin-top: 12px;
    color: #444;
    letter-spacing: 0.04em;
    line-height: 1;
    min-height: 3.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  #timer.active-arm  { color: var(--amber); }
  #timer.active-rec  { color: #e08080; }

  /* ── Session name input ────────────────────────────────────────────────────── */
  .field-label {
    font-size: 0.74rem;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 1rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--blue); }
  input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Microphone dots ───────────────────────────────────────────────────────── */
  .mic-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .mic-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    padding: 12px 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
  }
  .mic-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #3a1a1a;
    border: 2px solid #5a2a2a;
    transition: background 0.3s, border-color 0.3s;
  }
  .mic-dot.ok {
    background: var(--green);
    border-color: #3ecc71;
  }
  .mic-label-text {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  /* ── Disk bar ──────────────────────────────────────────────────────────────── */
  .disk-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .disk-free-val {
    font-size: 1.25rem;
    font-weight: 700;
    transition: color 0.3s;
  }
  .disk-total-val { font-size: 0.78rem; color: var(--muted); }
  .disk-track {
    width: 100%;
    height: 9px;
    background: #2a2a2a;
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .disk-fill {
    height: 100%;
    border-radius: 5px;
    background: var(--green);
    transition: width 0.5s ease, background 0.4s;
  }

  /* ── JACK / status row ─────────────────────────────────────────────────────── */
  .status-row {
    display: flex;
    gap: 0;
    align-items: center;
    font-size: 0.76rem;
    flex-wrap: wrap;
    gap: 8px;
  }
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 9px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5a1a1a;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.ok   { background: var(--green); }
  .status-dot.warn { background: var(--amber); }

  /* ── Recordings list ───────────────────────────────────────────────────────── */
  #rec-section { margin-top: 4px; }
  #rec-section h2 {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    margin-bottom: 10px;
    margin-top: 4px;
  }
  .rec-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 14px;
    margin-bottom: 9px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .rec-info { flex: 1; min-width: 0; }
  .rec-name {
    font-size: 0.87rem;
    font-weight: 600;
    word-break: break-all;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .rec-meta { font-size: 0.72rem; color: var(--muted); line-height: 1.5; }
  .dl-badge {
    font-size: 0.66rem;
    color: var(--green);
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }
  .rec-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-sm {
    padding: 7px 13px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: #2a2a2a;
    color: var(--text);
    font-size: 0.81rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-sm:hover { background: #333; }
  .btn-sm:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-dl  { background: #0d2a3a; border-color: #1a4a6a; color: #7ec8e8; }
  .btn-dl:hover { background: #0f3448; }
  .btn-del { border-color: #4a1a1a; color: #e06060; }
  .btn-del:hover { background: #2a0000; }

  #no-recs {
    color: var(--muted);
    font-size: 0.84rem;
    text-align: center;
    padding: 24px 0;
  }

  /* ── Footer ────────────────────────────────────────────────────────────────── */
  #footer {
    font-size: 0.68rem;
    color: #444;
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body>

<h1>
  FieldRec
  <span class="badge mock-badge" id="mock-badge" style="display:none">MOCK</span>
</h1>

<!-- Connection lost -->
<div id="conn-banner">&#9888; Connection lost — retrying&hellip;</div>

<!-- Error -->
<div id="error-banner">
  <strong>Error</strong>
  <span id="error-text"></span>
</div>

<!-- Main action card -->
<div class="card">
  <button id="main-btn" class="idle" onclick="handleMainBtn()">START</button>
  <div id="timer">—</div>
  <div style="margin-top:14px">
    <div class="field-label">Session name</div>
    <input type="text" id="session-input" placeholder="take" maxlength="60"
           autocomplete="off" autocorrect="off" spellcheck="false"
           onkeydown="if(event.key==='Enter'){event.preventDefault();handleMainBtn();}">
  </div>
</div>

<!-- Microphones -->
<div class="card">
  <div class="field-label" style="margin-bottom:10px">Microphones</div>
  <div class="mic-grid" id="mic-grid">
    <!-- dynamically filled -->
  </div>
</div>

<!-- Disk + JACK -->
<div class="card">
  <div class="disk-header">
    <span class="disk-free-val" id="disk-free">—</span>
    <span class="disk-total-val" id="disk-total">free</span>
  </div>
  <div class="disk-track"><div class="disk-fill" id="disk-fill" style="width:0%"></div></div>
  <div class="status-row">
    <span class="status-chip">
      <span class="status-dot" id="jack-dot"></span>
      <span id="jack-label">JACK</span>
    </span>
    <span class="status-chip">
      <span id="xruns-val">xruns: —</span>
    </span>
    <span class="status-chip">
      <span id="sr-val">— Hz</span>
    </span>
  </div>
</div>

<!-- Recordings -->
<div id="rec-section">
  <h2>Recordings</h2>
  <div id="rec-list"><div id="no-recs">Loading&hellip;</div></div>
</div>

<div id="footer">pi time: —</div>

<script>
(function () {
  "use strict";

  // ── State ──────────────────────────────────────────────────────────────────
  let lastState = "IDLE";
  let prevState = "IDLE";
  let connErrCount = 0;
  let pollTimer = null;
  let minFreeMb = 500;
  let countdownBeeps = 3;
  let micCount = 4;  // updated from status

  // ── Init ───────────────────────────────────────────────────────────────────
  // Sync time on load
  fetch("/api/time", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ client_ms: Date.now() }),
  }).catch(() => {});

  // Health check → mock badge
  fetch("/api/health")
    .then(r => r.json())
    .then(h => {
      if (h.mock) {
        document.getElementById("mock-badge").style.display = "";
      }
    })
    .catch(() => {});

  // Build initial mic grid (4 slots; will be updated by status)
  buildMicGrid(4);

  // ── Polling ────────────────────────────────────────────────────────────────
  function poll() {
    fetch("/api/status", { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(data => {
        connErrCount = 0;
        document.getElementById("conn-banner").style.display = "none";
        updateUI(data);
      })
      .catch(() => {
        connErrCount++;
        if (connErrCount >= 2) {
          document.getElementById("conn-banner").style.display = "block";
        }
      });
  }

  poll();
  setInterval(poll, 1000);

  // ── UI update ──────────────────────────────────────────────────────────────
  function updateUI(d) {
    prevState = lastState;
    lastState = d.state || "IDLE";
    countdownBeeps = d.countdown_beeps || 3;

    updateButton(d);
    updateTimer(d);
    updateMics(d.mics || []);
    updateDisk(d);
    updateJack(d);
    updateFooter(d);
    updateError(d);

    // Reload recordings whenever we return to IDLE from a non-IDLE state
    if (prevState !== "IDLE" && lastState === "IDLE") {
      setTimeout(loadRecordings, 600);
    }
  }

  // ── Button ─────────────────────────────────────────────────────────────────
  function updateButton(d) {
    const btn = document.getElementById("main-btn");
    const state = d.state;

    btn.className = state.toLowerCase();

    switch (state) {
      case "IDLE":
        btn.disabled = false;
        btn.innerHTML = "START";
        break;
      case "ARMING": {
        btn.disabled = true;
        const beepsLeft = Math.max(0, countdownBeeps - Math.floor(d.elapsed_seconds));
        if (beepsLeft > 0) {
          btn.innerHTML = `<span class="spinner"></span><span>${beepsLeft}</span>`;
        } else {
          btn.innerHTML = `<span class="spinner"></span><span>Starting&hellip;</span>`;
        }
        break;
      }
      case "RECORDING":
        btn.disabled = false;
        btn.innerHTML = `<span class="pulse-dot"></span><span>STOP</span>`;
        break;
      case "STOPPING":
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span><span>Saving&hellip;</span>`;
        break;
      case "ERROR":
        btn.disabled = false;
        btn.innerHTML = "Reset";
        break;
      default:
        btn.innerHTML = state;
    }
  }

  // ── Timer ──────────────────────────────────────────────────────────────────
  function updateTimer(d) {
    const el = document.getElementById("timer");
    const state = d.state;
    const elapsed = d.elapsed_seconds || 0;

    if (state === "RECORDING") {
      const s = Math.floor(elapsed);
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      el.textContent = `${mm}:${ss}`;
      el.className = "active-rec";
    } else if (state === "ARMING") {
      const beepsLeft = Math.max(0, countdownBeeps - Math.floor(elapsed));
      el.textContent = beepsLeft > 0 ? String(beepsLeft) : "…";
      el.className = "active-arm";
    } else {
      el.textContent = "—";
      el.className = "";
    }
  }

  // ── Mics ───────────────────────────────────────────────────────────────────
  function buildMicGrid(n) {
    const grid = document.getElementById("mic-grid");
    grid.innerHTML = "";
    for (let i = 0; i < n; i++) {
      const cell = document.createElement("div");
      cell.className = "mic-cell";
      cell.innerHTML = `
        <div class="mic-dot" id="mic-dot-${i}" title="MIC${i+1}"></div>
        <div class="mic-label-text">MIC${i+1}</div>
      `;
      grid.appendChild(cell);
    }
    micCount = n;
  }

  function updateMics(mics) {
    if (mics.length !== micCount) {
      buildMicGrid(mics.length || 4);
    }
    mics.forEach((m, i) => {
      const dot = document.getElementById("mic-dot-" + i);
      if (!dot) return;
      dot.classList.toggle("ok", !!m.present);
      dot.title = `MIC${i+1}` + (m.usb_port ? ` (${m.usb_port})` : "") + (m.present ? " ✓" : " ✗");
    });
  }

  // ── Disk ───────────────────────────────────────────────────────────────────
  function updateDisk(d) {
    const freeMb  = d.disk_free_mb  || 0;
    const totalMb = d.disk_total_mb || 0;
    const freeGb  = (freeMb  / 1024).toFixed(1);
    const totalGb = (totalMb / 1024).toFixed(1);

    const freeEl = document.getElementById("disk-free");
    const fillEl = document.getElementById("disk-fill");

    freeEl.textContent = `${freeGb} GB`;
    document.getElementById("disk-total").textContent = `free of ${totalGb} GB`;

    const usedPct = totalMb > 0 ? ((totalMb - freeMb) / totalMb) * 100 : 0;
    fillEl.style.width = Math.min(100, usedPct).toFixed(1) + "%";

    // Color thresholds
    let color;
    if (freeMb < minFreeMb) {
      color = "var(--red)";
    } else if (freeMb < 2048) {
      color = "var(--amber)";
    } else {
      color = "var(--green)";
    }
    freeEl.style.color = color;
    fillEl.style.background = color;
  }

  // ── JACK ───────────────────────────────────────────────────────────────────
  function updateJack(d) {
    const dot   = document.getElementById("jack-dot");
    const label = document.getElementById("jack-label");
    const alive = !!d.jack_alive;

    dot.classList.toggle("ok",   alive);
    dot.classList.toggle("warn", !alive);
    label.textContent = alive ? "JACK" : "JACK offline";

    const xr = d.xruns;
    document.getElementById("xruns-val").textContent =
      (xr === null || xr === undefined || xr < 0) ? "xruns: n/a" : `xruns: ${xr}`;

    document.getElementById("sr-val").textContent =
      d.sample_rate ? `${d.sample_rate} Hz` : "— Hz";
  }

  // ── Footer / pi time ───────────────────────────────────────────────────────
  function updateFooter(d) {
    const el = document.getElementById("footer");
    if (d.pi_time) {
      el.textContent = "Pi: " + d.pi_time.replace("T", " ").slice(0, 19) + " UTC";
    }
  }

  // ── Error ──────────────────────────────────────────────────────────────────
  function updateError(d) {
    const banner = document.getElementById("error-banner");
    const input  = document.getElementById("session-input");
    if (d.state === "ERROR" && d.error) {
      document.getElementById("error-text").textContent = d.error;
      banner.style.display = "block";
    } else if (d.state !== "ERROR") {
      banner.style.display = "none";
    }
    // Disable session input while not IDLE
    input.disabled = (d.state !== "IDLE");
  }

  // ── Button handler ─────────────────────────────────────────────────────────
  window.handleMainBtn = function () {
    if (lastState === "IDLE") {
      doStart();
    } else if (lastState === "RECORDING") {
      doStop();
    } else if (lastState === "ERROR") {
      doReset();
    }
  };

  function doStart() {
    const session = document.getElementById("session-input").value.trim() || "take";
    fetch("/api/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session }),
    })
      .then(r => r.json().then(body => ({ ok: r.ok, body })))
      .then(({ ok, body }) => {
        if (!ok) showError(body.detail || "Start failed");
      })
      .catch(e => showError("Network: " + e));
  }

  function doStop() {
    fetch("/api/stop", { method: "POST" })
      .then(r => r.json().then(body => ({ ok: r.ok, body })))
      .then(({ ok, body }) => {
        if (!ok) showError(body.detail || "Stop failed");
      })
      .catch(e => showError("Network: " + e));
  }

  function doReset() {
    fetch("/api/reset", { method: "POST" })
      .then(r => r.json())
      .then(d => updateUI(d))
      .catch(() => {});
  }

  function showError(msg) {
    document.getElementById("error-text").textContent = msg;
    document.getElementById("error-banner").style.display = "block";
  }

  // ── Recordings ─────────────────────────────────────────────────────────────
  function loadRecordings() {
    fetch("/api/recordings", { cache: "no-store" })
      .then(r => r.json())
      .then(renderRecordings)
      .catch(() => {});
  }

  loadRecordings();
  setInterval(loadRecordings, 15000);

  function fmtDuration(s) {
    if (!s || s <= 0) return "0s";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
  }

  function fmtSize(bytes) {
    if (!bytes) return "0 B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(0) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  }

  function fmtTs(iso) {
    if (!iso) return "";
    return iso.replace("T", " ").slice(0, 19);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function renderRecordings(list) {
    const el = document.getElementById("rec-list");
    if (!list || list.length === 0) {
      el.innerHTML = '<div id="no-recs">No recordings yet.</div>';
      return;
    }
    el.innerHTML = list.map(r => {
      const dlBadge = r.downloaded
        ? `<span class="dl-badge">&#10003; downloaded</span>`
        : "";
      const meta = [
        fmtDuration(r.duration_s),
        fmtSize(r.size_bytes),
        fmtTs(r.timestamp || r.created),
      ].filter(Boolean).join(" &middot; ");
      return `
<div class="rec-item" id="rec-${esc(r.name)}">
  <div class="rec-info">
    <div class="rec-name">${esc(r.name)}${dlBadge}</div>
    <div class="rec-meta">${meta}</div>
  </div>
  <div class="rec-actions">
    <button class="btn-sm btn-dl" onclick="dlRec('${esc(r.name)}',this)">Download</button>
    <button class="btn-sm btn-del" onclick="delRec('${esc(r.name)}',this)">Delete</button>
  </div>
</div>`;
    }).join("");
  }

  window.dlRec = function (name, btn) {
    btn.disabled = true;
    btn.textContent = "…";
    const a = document.createElement("a");
    a.href = "/api/recordings/" + encodeURIComponent(name) + "/download";
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Re-enable and reload list after delay (sidecar gets "downloaded" flag)
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = "Download";
      loadRecordings();
    }, 1500);
  };

  window.delRec = function (name, btn) {
    if (!confirm("Delete recording:\n" + name + "\n\nThis cannot be undone.")) return;
    btn.disabled = true;
    btn.textContent = "…";
    fetch("/api/recordings/" + encodeURIComponent(name), { method: "DELETE" })
      .then(r => {
        if (r.ok) {
          const item = document.getElementById("rec-" + name);
          if (item) item.remove();
          loadRecordings();
        } else {
          r.json().then(b => showError(b.detail || "Delete failed")).catch(() => {});
          btn.disabled = false;
          btn.textContent = "Delete";
        }
      })
      .catch(e => {
        showError("Network: " + e);
        btn.disabled = false;
        btn.textContent = "Delete";
      });
  };

})();
</script>
</body>
</html>
